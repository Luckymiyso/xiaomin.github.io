<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>碰碰星 · 你的随身情绪充电站</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      background: radial-gradient(ellipse at center, #0d0d1a 0%, #02020a 100%);
      min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
      font-family: -apple-system, sans-serif;padding:20px;overflow-x:hidden;color:#e0e0e0;
      -webkit-tap-highlight-color: transparent;user-select:none;position:relative;
    }
    .bg-particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
    .particle{
      position:absolute;background:white;border-radius:50%;opacity:0.15;
      animation: float 8s infinite ease-in-out, twinkle 3s infinite alternate;
    }
    .bg-stars-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
    .bg-star{
      position:absolute;
      animation: starPulse 2s infinite ease-in-out, starFloat 8s infinite ease-in-out;
      will-change:transform;
      transition: transform 0.6s ease-in, opacity 0.6s ease-in;
    }
    .bg-star.vanishing{
      transform: scale(0) rotate(360deg) !important;
      opacity: 0 !important;
      animation: none !important;
    }
    @keyframes starPulse{0%{transform:scale(1);opacity:0.7}50%{transform:scale(1.4);opacity:1}100%{transform:scale(1);opacity:0.7}}
    @keyframes starFloat{0%{transform:translateY(0)}50%{transform:translateY(-20px)}100%{transform:translateY(0)}}
    @keyframes float{0%,100%{transform:translateY(0) scale(1);opacity:0.1}50%{transform:translateY(-30px) scale(1.4);opacity:0.3}}
    @keyframes twinkle{0%{opacity:0.1}50%{opacity:0.6}100%{opacity:0.1}}
    @keyframes starScatter{
      0%{transform:translate(0,0) scale(0);opacity:0}
      15%{opacity:1;transform:translate(var(--dx15),var(--dy15)) scale(1.2)}
      40%{opacity:0.9;transform:translate(var(--dx40),var(--dy40)) scale(0.8)}
      100%{opacity:0;transform:translate(var(--dx100),var(--dy100)) scale(0.2)}
    }
    .scatter-star{position:fixed;z-index:28;pointer-events:none;animation:starScatter 1.8s ease-out forwards}
    .container{position:relative;z-index:2;width:100%;max-width:400px;display:flex;flex-direction:column;align-items:center;gap:24px}
    .title{text-align:center;margin-bottom:10px;line-height:1.2}
    .title-main{display:block;font-size:2.4rem;font-weight:400;color:#ffd966;letter-spacing:8px}
    .title-sub{display:block;font-size:1.1rem;font-weight:300;color:#8888aa;letter-spacing:4px;margin-top:2px}
    .black-hole-wrapper{position:relative;width:180px;height:180px}
    .black-hole{
      position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      width:120px;height:120px;border-radius:50%;
      background:radial-gradient(circle at 30% 30%, #1a1a2e, #000000 90%);
      box-shadow:0 0 40px rgba(100,50,200,0.4),0 0 80px rgba(0,0,0,0.9);
      transition: transform 0.3s ease, box-shadow 0.3s;z-index:3;
    }
    .accretion-disk{
      position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      width:160px;height:160px;border-radius:50%;border:2px solid transparent;
      border-top-color:rgba(180,130,255,0.5);border-right-color:rgba(180,130,255,0.2);
      animation:spin 4s linear infinite;z-index:2;filter:blur(2px);
    }
    .accretion-disk:nth-child(2){
      width:140px;height:140px;
      border-top-color:rgba(255,200,100,0.4);border-left-color:rgba(255,200,100,0.2);
      animation-duration:6s;animation-direction:reverse;
    }
    @keyframes spin{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}
    .input-area{
      width:100%;background:rgba(20,20,35,0.7);backdrop-filter:blur(15px);
      border-radius:24px;padding:16px;border:1px solid rgba(255,255,255,0.08);
      display:flex;flex-direction:column;gap:12px;
    }
    textarea{
      width:100%;background:transparent;border:none;color:#ddd;font-size:1rem;
      line-height:1.5;resize:none;outline:none;font-family:inherit;min-height:60px;
    }
    textarea::placeholder{color:#555;font-style:italic}
    .button-row{display:flex;gap:12px;align-items:center}
    .btn{
      background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);
      color:#ccc;padding:12px 20px;border-radius:40px;font-size:0.95rem;font-weight:500;
      cursor:pointer;backdrop-filter:blur(10px);transition:all 0.2s;
      display:flex;align-items:center;justify-content:center;gap:6px;flex:1;white-space:nowrap;
    }
    .btn.primary{
      background:rgba(200,160,255,0.2);border-color:rgba(200,160,255,0.4);
      color:#e8d5ff;font-weight:600;letter-spacing:1px;
    }
    .btn:active{transform:scale(0.96);background:rgba(255,255,255,0.12)}
    .btn.primary:active{background:rgba(200,160,255,0.35)}
    .btn:disabled{opacity:0.4;pointer-events:none}
    .voice-btn{
      background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.2);
      border-radius:50%;width:44px;height:44px;display:flex;align-items:center;
      justify-content:center;cursor:pointer;flex:0 0 auto;font-size:1.3rem;
    }
    .voice-btn:active{transform:scale(0.94)}
    .top-right-area{position:fixed;top:20px;right:20px;z-index:20;display:flex;gap:10px;align-items:center}
    .sound-toggle{
      background:rgba(15,15,25,0.8);backdrop-filter:blur(10px);border-radius:50%;
      width:38px;height:38px;display:flex;align-items:center;justify-content:center;
      cursor:pointer;border:1px solid rgba(255,255,255,0.15);color:#aaa;font-size:1.2rem;transition:all 0.3s;
    }
    .sound-toggle:active{background:rgba(60,60,80,0.7)}
    .star-dashboard{
      background:rgba(15,15,25,0.8);backdrop-filter:blur(10px);border-radius:30px;
      padding:8px 16px;display:flex;align-items:center;gap:10px;
      border:1px solid rgba(255,215,0,0.3);box-shadow:0 0 25px rgba(255,200,0,0.15);
      cursor:pointer;transition:all 0.3s;
    }
    .star-dashboard:hover{box-shadow:0 0 35px rgba(255,200,0,0.3)}
    .star-emoji{font-size:1.4rem;animation:starGlow 2s infinite alternate}
    @keyframes starGlow{0%{text-shadow:0 0 5px #ffd700}100%{text-shadow:0 0 20px #ffaa00}}
    .star-count{font-weight:600;font-size:1.1rem;color:#ffd966}
    .clear-sky-btn{
      background:rgba(15,15,25,0.8);backdrop-filter:blur(10px);border-radius:30px;
      padding:8px 14px;display:flex;align-items:center;gap:6px;
      border:1px solid rgba(255,100,100,0.3);box-shadow:0 0 15px rgba(255,80,80,0.1);
      cursor:pointer;transition:all 0.3s;font-size:0.85rem;color:#e88;white-space:nowrap;
    }
    .clear-sky-btn:active{background:rgba(255,80,80,0.2);transform:scale(0.96)}
    .galaxy-modal{
      position:fixed;top:0;left:0;width:100%;height:100%;
      background:rgba(0,0,0,0.85);backdrop-filter:blur(10px);z-index:100;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      opacity:0;pointer-events:none;transition:opacity 0.3s;
    }
    .galaxy-modal.open{opacity:1;pointer-events:auto}
    .galaxy-header{
      width:90%;max-width:400px;display:flex;justify-content:space-between;
      align-items:center;margin-bottom:10px;
    }
    .batch-delete-btn{
      background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.2);
      color:#ccc;padding:8px 16px;border-radius:25px;font-size:0.85rem;
      cursor:pointer;backdrop-filter:blur(10px);transition:all 0.2s;
    }
    .batch-delete-btn.active{background:rgba(255,80,80,0.3);border-color:#ff5555}
    .batch-actions{display:none;gap:10px}
    .batch-actions.visible{display:flex}
    .galaxy-content{
      width:90%;max-width:400px;max-height:60vh;overflow-y:auto;
      display:flex;flex-wrap:wrap;gap:16px;justify-content:center;padding:20px;
    }
    .galaxy-star{
      width:56px;height:56px;display:flex;align-items:center;justify-content:center;
      background:rgba(30,30,50,0.7);border-radius:14px;cursor:pointer;
      transition:transform 0.2s,box-shadow 0.2s;position:relative;
    }
    .galaxy-star.selected{box-shadow:0 0 0 3px #ffd966}
    .galaxy-star:active{transform:scale(0.92)}
    .star-detail-modal{
      position:fixed;top:0;left:0;width:100%;height:100%;
      background:rgba(0,0,0,0.9);backdrop-filter:blur(15px);z-index:120;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      opacity:0;pointer-events:none;transition:opacity 0.25s;
    }
    .star-detail-modal.open{opacity:1;pointer-events:auto}
    .star-detail-card{
      background:rgba(25,25,45,0.95);border-radius:22px;padding:28px 24px;
      width:85%;max-width:360px;border:1px solid rgba(255,255,255,0.1);
      text-align:center;display:flex;flex-direction:column;align-items:center;gap:20px;
    }
    .star-detail-card .big-star{width:72px;height:72px;display:flex;align-items:center;justify-content:center}
    .star-detail-card .memory-text{
      color:#ccc;font-size:0.95rem;line-height:1.6;max-height:120px;
      overflow-y:auto;padding:0 8px;word-break:break-word;
    }
    .star-detail-card .memory-time{color:#666;font-size:0.7rem}
    .star-detail-card .btn-row{display:flex;gap:14px}
    .star-detail-card .btn-small{
      background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);
      color:#aaa;padding:10px 22px;border-radius:30px;font-size:0.85rem;
      cursor:pointer;transition:all 0.2s;
    }
    .star-detail-card .btn-small.danger{border-color:rgba(255,100,100,0.3);color:#e88}
    .star-detail-card .btn-small:active{transform:scale(0.94);background:rgba(255,255,255,0.12)}
    .close-btn{
      margin-top:20px;color:#aaa;background:transparent;
      border:1px solid #aaa;padding:8px 24px;border-radius:25px;cursor:pointer;
    }
    .empty-hint{color:#666;text-align:center;padding:40px;width:100%}
    .toast{
      position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
      background:rgba(0,0,0,0.85);color:#ddd;padding:10px 22px;border-radius:30px;
      font-size:0.9rem;z-index:200;opacity:0;transition:opacity 0.3s;pointer-events:none;
    }
    .toast.show{opacity:1}
    .feedback-trigger{
      position:fixed;top:20px;left:20px;z-index:50;width:38px;height:38px;
      border-radius:50%;background:rgba(30,30,50,0.6);backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;
      justify-content:center;cursor:pointer;font-size:1rem;color:#999;transition:all 0.3s;
    }
    .feedback-trigger:active{background:rgba(60,60,80,0.7);transform:scale(0.94);color:#ccc}
    .feedback-modal{
      position:fixed;top:70px;left:20px;z-index:60;
      background:rgba(22,22,38,0.96);backdrop-filter:blur(20px);
      border-radius:18px;padding:22px 20px 18px;border:1px solid rgba(255,255,255,0.08);
      box-shadow:0 12px 40px rgba(0,0,0,0.5);width:250px;
      opacity:0;pointer-events:none;transform:translateY(-8px);transition:all 0.25s ease;
    }
    .feedback-modal.open{opacity:1;pointer-events:auto;transform:translateY(0)}
    .feedback-modal .qr-code{
      width:100%;max-width:200px;height:auto;margin:0 auto 14px;display:block;
      background:#fff;border-radius:10px;padding:6px;cursor:pointer;
    }
    .feedback-modal .hint{font-size:0.78rem;color:#aaa;text-align:center;line-height:1.7}
    .feedback-modal .hint .warm{color:#e8d5b0}
    .feedback-modal .social-row{display:flex;gap:10px;justify-content:center;margin-top:12px;font-size:0.7rem;color:#777}
    .feedback-overlay{
      position:fixed;top:0;left:0;width:100%;height:100%;z-index:55;pointer-events:none;
    }
    .feedback-overlay.active{pointer-events:auto}
    .hint-text{font-size:0.7rem;color:#555;text-align:center;margin-top:-8px}
    .img-lightbox{
      position:fixed;top:0;left:0;width:100%;height:100%;
      background:rgba(0,0,0,0.88);backdrop-filter:blur(8px);z-index:300;
      display:flex;align-items:center;justify-content:center;
      opacity:0;pointer-events:none;transition:opacity 0.25s;
    }
    .img-lightbox.open{opacity:1;pointer-events:auto}
    .img-lightbox img{
      max-width:85%;max-height:80%;border-radius:12px;
      box-shadow:0 0 40px rgba(0,0,0,0.8);background:#fff;padding:8px;
    }
    #fireworksCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:150;pointer-events:none}
  </style>
</head>
<body>
  <div class="bg-particles" id="particles"></div>
  <div class="bg-stars-container" id="bgStarsContainer"></div>
  <canvas id="fireworksCanvas"></canvas>
  
  <div class="container">
    <div class="title">
      <span class="title-main">碰碰星</span>
      <span class="title-sub">你的随身情绪充电站</span>
    </div>
    <div class="black-hole-wrapper" id="blackHoleWrapper">
      <div class="accretion-disk"></div>
      <div class="accretion-disk"></div>
      <div class="black-hole" id="blackHole"></div>
    </div>
    <div class="input-area">
      <textarea id="textInput" placeholder="写下今天的小事，变成一颗星…" maxlength="500"></textarea>
      <div class="button-row">
        <button class="btn primary" id="throwBtn">咻~</button>
        <button class="voice-btn" id="voiceHintBtn" title="语音输入提示">🎙</button>
      </div>
    </div>
    <div class="hint-text">你是最棒的小宝！</div>
  </div>
  
  <div class="top-right-area">
    <div class="sound-toggle" id="soundToggle" title="声音已关闭">🔇</div>
    <div class="star-dashboard" id="starDashboard">
      <span class="star-emoji">⭐</span>
      <span class="star-count" id="starCount">0</span>
    </div>
    <div class="clear-sky-btn" id="clearSkyBtn">🎆 清空星空</div>
  </div>
  
  <div class="galaxy-modal" id="galaxyModal">
    <div class="galaxy-header">
      <button class="batch-delete-btn" id="batchDeleteBtn">⚡ 批量删除 (星星内容都可见)</button>
      <div class="batch-actions" id="batchActions">
        <button class="batch-delete-btn active" id="confirmBatchBtn">确认删除</button>
        <button class="batch-delete-btn" id="cancelBatchBtn">取消</button>
      </div>
    </div>
    <div class="galaxy-content" id="galaxyContent"></div>
    <button class="close-btn" id="closeGalaxy">关闭</button>
  </div>
  
  <div class="star-detail-modal" id="starDetailModal">
    <div class="star-detail-card">
      <div class="big-star" id="detailStarIcon"></div>
      <div class="memory-text" id="detailText"></div>
      <div class="memory-time" id="detailTime"></div>
      <div class="btn-row">
        <button class="btn-small" id="closeDetailBtn">返回</button>
        <button class="btn-small danger" id="deleteStarBtn">删除这颗星</button>
      </div>
    </div>
  </div>
  
  <div class="feedback-trigger" id="feedbackTrigger" title="有小困在听">✉</div>
  <div class="feedback-overlay" id="feedbackOverlay"></div>
  <div class="feedback-modal" id="feedbackModal">
    <img class="qr-code" id="qrImage" src="Min.png" alt="关注小Min">
    <div class="hint">
      <span class="warm">点击放大 | 长按识别二维码</span><br>
      关注小红书，看小Min日常<br>
    </div>
    <div class="social-row">
      <span>希望你天天开心！&gt;‿❛</span>
    </div>
  </div>
  
  <div class="img-lightbox" id="imgLightbox">
    <img id="lightboxImg" src="" alt="二维码大图">
  </div>
  
  <div class="toast" id="toast"></div>
  
  <script>
    (function() {
      // ========== 声音开关 ==========
      let soundEnabled = false;
      const soundToggle = document.getElementById('soundToggle');
      soundToggle.addEventListener('click', () => {
        soundEnabled = !soundEnabled;
        soundToggle.textContent = soundEnabled ? '🔊' : '🔇';
        soundToggle.title = soundEnabled ? '声音已开启' : '声音已关闭';
      });
      // ========== 音效 ==========
      function playStarChime() {
        if (!soundEnabled) return;
        try {
          const AudioCtxClass = window.AudioContext || window.webkitAudioContext;
          if (!AudioCtxClass) return;
          const audioCtx = new AudioCtxClass();
          const startSound = () => {
            try {
              const now = audioCtx.currentTime;
              const oscLow = audioCtx.createOscillator();
              const gainLow = audioCtx.createGain();
              oscLow.type = 'sine';
              oscLow.frequency.setValueAtTime(200, now);
              oscLow.frequency.linearRampToValueAtTime(300, now + 0.4);
              gainLow.gain.setValueAtTime(0.2, now);
              gainLow.gain.linearRampToValueAtTime(0, now + 0.5);
              oscLow.connect(gainLow);
              gainLow.connect(audioCtx.destination);
              oscLow.start(now);
              oscLow.stop(now + 0.5);
              const notes = [1200, 1600, 2000, 2400, 1800, 1400];
              notes.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = freq;
                const startTime = now + 0.35 + i * 0.04;
                gain.gain.setValueAtTime(0.12, startTime);
                gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.25);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(startTime);
                osc.stop(startTime + 0.3);
              });
              const bufferSize = audioCtx.sampleRate * 0.6;
              const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
              const data = noiseBuffer.getChannelData(0);
              for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.25;
              const noise = audioCtx.createBufferSource();
              noise.buffer = noiseBuffer;
              const noiseGain = audioCtx.createGain();
              noiseGain.gain.setValueAtTime(0.15, now + 0.4);
              noiseGain.gain.linearRampToValueAtTime(0, now + 1.0);
              noise.connect(noiseGain);
              noiseGain.connect(audioCtx.destination);
              noise.start(now + 0.4);
              noise.stop(now + 1.0);
            } catch (e) {}
          };
          if (audioCtx.state === 'suspended') audioCtx.resume().then(startSound);
          else startSound();
        } catch (e) {}
      }
      // ========== 烟花爆炸音效 ==========
      function playFireworkBoom() {
        if (!soundEnabled) return;
        try {
          const AudioCtxClass = window.AudioContext || window.webkitAudioContext;
          if (!AudioCtxClass) return;
          const audioCtx = new AudioCtxClass();
          const play = () => {
            try {
              const now = audioCtx.currentTime;
              // 低频嘭声
              const osc = audioCtx.createOscillator();
              const gain = audioCtx.createGain();
              osc.type = 'sine';
              osc.frequency.setValueAtTime(150, now);
              osc.frequency.exponentialRampToValueAtTime(40, now + 0.3);
              gain.gain.setValueAtTime(0.3, now);
              gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
              osc.connect(gain);
              gain.connect(audioCtx.destination);
              osc.start(now);
              osc.stop(now + 0.4);
              // 噪声爆炸
              const bufSize = Math.floor(audioCtx.sampleRate * 0.3);
              const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
              const d = buf.getChannelData(0);
              for (let i = 0; i < bufSize; i++) d[i] = (Math.random() * 2 - 1);
              const src = audioCtx.createBufferSource();
              src.buffer = buf;
              const ng = audioCtx.createGain();
              ng.gain.setValueAtTime(0.2, now);
              ng.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
              src.connect(ng);
              ng.connect(audioCtx.destination);
              src.start(now);
              src.stop(now + 0.3);
            } catch(e) {}
          };
          if (audioCtx.state === 'suspended') audioCtx.resume().then(play);
          else play();
        } catch(e) {}
      }
      // ========== 背景粒子 ==========
      const particlesContainer = document.getElementById('particles');
      for (let i = 0; i < 60; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        const size = Math.random() * 2.5 + 1;
        particle.style.width = size + 'px';
        particle.style.height = size + 'px';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 8 + 's';
        particle.style.animationDuration = (Math.random() * 8 + 6) + 's';
        particlesContainer.appendChild(particle);
      }
      // ========== 数据存储 ==========
      let stars = [];
      let bgStarCount = 0;
      let currentViewingIndex = -1;
      const STORAGE_KEY = 'pengpeng_stars';
      const BG_STARS_KEY = 'pengpeng_bg_stars';
      function loadStars() {
        try {
          const stored = localStorage.getItem(STORAGE_KEY);
          if (stored) {
            const parsed = JSON.parse(stored);
            stars = Array.isArray(parsed) ? parsed : [];
          }
        } catch (e) { stars = []; }
      }
      function saveStars() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(stars));
        } catch(e) {
          for (let i = 0; i < stars.length; i++) {
            stars.shift();
            try {
              localStorage.setItem(STORAGE_KEY, JSON.stringify(stars));
              showToast('存储空间已满，最旧的星星已消散');
              return;

      // ========== 烟花系统 ==========
      function startFireworks() {

        let rocketsLaunched = 0;

          if (rocketsLaunched >= rocketCount) return;

          const targetY = canvas.height * 0.15 + Math.random() * canvas.height * 0.35;
          const hue = Math.floor(Math.random() * 360);
          fireworks.push({
            x: x,
            y: canvas.height,

            hue: hue,
            speed: 6 + Math.random() * 3,
            trail: [],

          rocketsLaunched++;

              vy: Math.sin(angle) * speed,
              hue: hueVar,
              alpha: 1,
              decay: 0.012 + Math.random() * 0.015,
              size: 2 + Math.random() * 2,

              blackHole.style.boxShadow = '0 0 40px rgba(100,50,200,0.4), 0 0 80px rgba(0,0,0,0.9)';
              const timestamp = Date.now();
              const svgString = generateUniqueStarSVG(text, timestamp);
              addStar({ svg: svgString, text: text.slice(0,200), time: timestamp });
              const holeCenterX = holeRect.left + holeRect.width/2;
              const holeCenterY = holeRect.top + holeRect.height/2;
              triggerScatterEffect(holeCenterX, holeCenterY);
              createBackgroundStar();
            } catch(e) {
              console.error('星星创建出错:', e);
              showToast('出错: ' + e.message);
            } finally {
              throwBtn.disabled = false;
            }
          }, 800);
        }, 300);
      }
      throwBtn.addEventListener('click', triggerBlackHole);
      textInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); triggerBlackHole(); }
      });
      // ========== 语音提示 ==========
      document.getElementById('voiceHintBtn').addEventListener('click', () => {
        showToast('点击输入框 → 按键盘上的🎤即可语音输入');
      });
      // ========== 弹窗交互 ==========
      document.getElementById('starDashboard').addEventListener('click', showGalaxy);
      document.getElementById('closeGalaxy').addEventListener('click', hideGalaxy);
      document.getElementById('galaxyModal').addEventListener('click', (e) => {
        if(e.target === document.getElementById('galaxyModal')) hideGalaxy();
      });
      document.getElementById('closeDetailBtn').addEventListener('click', closeStarDetail);
      document.getElementById('deleteStarBtn').addEventListener('click', handleDeleteStar);
      document.getElementById('starDetailModal').addEventListener('click', (e) => {
        if(e.target === document.getElementById('starDetailModal')) closeStarDetail();
      });
      // ========== 反馈弹窗 ==========
      const feedbackTrigger = document.getElementById('feedbackTrigger');
      const feedbackModal = document.getElementById('feedbackModal');
      const feedbackOverlay = document.getElementById('feedbackOverlay');
      feedbackTrigger.addEventListener('click', () => {
        const isOpen = feedbackModal.classList.contains('open');
        if(isOpen){ feedbackModal.classList.remove('open'); feedbackOverlay.classList.remove('active'); }
        else { feedbackModal.classList.add('open'); feedbackOverlay.classList.add('active'); }
      });
      feedbackOverlay.addEventListener('click', () => {
        feedbackModal.classList.remove('open'); feedbackOverlay.classList.remove('active');
      });
      // ========== 图片灯箱 ==========
      const qrImage = document.getElementById('qrImage');
      const lightbox = document.getElementById('imgLightbox');
      const lightboxImg = document.getElementById('lightboxImg');
      qrImage.addEventListener('click', () => { lightboxImg.src = qrImage.src; lightbox.classList.add('open'); });
      lightbox.addEventListener('click', () => { lightbox.classList.remove('open'); });
      // ========== 启动 ==========
      loadStars();
      loadBgStars();
      updateStarCounter();
      restoreBgStars();
    })();
  </script>
</body>
</html>
