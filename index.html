<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>碰碰星 · 你的随身情绪充电站</title>
  <link rel="manifest" href="manifest.json">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      background: radial-gradient(ellipse at center, #0d0d1a 0%, #02020a 100%);
      min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
      font-family: -apple-system, sans-serif;padding:20px;overflow-x:hidden;color:#e0e0e0;
      -webkit-tap-highlight-color: transparent;user-select:none;position:relative;
    }
    .bg-particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
    .particle{
      position:absolute;background:white;border-radius:50%;opacity:0.15;
      animation: float 8s infinite ease-in-out, twinkle 3s infinite alternate;
    }
    .bg-stars-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
    .bg-star{
      position:absolute;
      animation: starPulse 2s infinite ease-in-out, starFloat 8s infinite ease-in-out;
      will-change:transform;
    }
    @keyframes starPulse{0%{transform:scale(1);opacity:0.7}50%{transform:scale(1.4);opacity:1}100%{transform:scale(1);opacity:0.7}}
    @keyframes starFloat{0%{transform:translateY(0)}50%{transform:translateY(-20px)}100%{transform:translateY(0)}}
    @keyframes float{0%,100%{transform:translateY(0) scale(1);opacity:0.1}50%{transform:translateY(-30px) scale(1.4);opacity:0.3}}
    @keyframes twinkle{0%{opacity:0.1}50%{opacity:0.6}100%{opacity:0.1}}

    .container{position:relative;z-index:2;width:100%;max-width:400px;display:flex;flex-direction:column;align-items:center;gap:24px}
    .title{text-align:center;margin-bottom:10px;line-height:1.2}
    .title-main{display:block;font-size:2.4rem;font-weight:400;color:#ffd966;letter-spacing:8px}
    .title-sub{display:block;font-size:0.8rem;font-weight:300;color:#8888aa;letter-spacing:4px;margin-top:2px}
    .black-hole-wrapper{position:relative;width:180px;height:180px}
    .black-hole{
      position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      width:120px;height:120px;border-radius:50%;
      background:radial-gradient(circle at 30% 30%, #1a1a2e, #000000 90%);
      box-shadow:0 0 40px rgba(100,50,200,0.4),0 0 80px rgba(0,0,0,0.9);
      transition: transform 0.3s ease, box-shadow 0.3s;z-index:3;
    }
    .accretion-disk{
      position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      width:160px;height:160px;border-radius:50%;border:2px solid transparent;
      border-top-color:rgba(180,130,255,0.5);border-right-color:rgba(180,130,255,0.2);
      animation:spin 4s linear infinite;z-index:2;filter:blur(2px);
    }
    .accretion-disk:nth-child(2){
      width:140px;height:140px;
      border-top-color:rgba(255,200,100,0.4);border-left-color:rgba(255,200,100,0.2);
      animation-duration:6s;animation-direction:reverse;
    }
    @keyframes spin{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}
    .input-area{
      width:100%;background:rgba(20,20,35,0.7);backdrop-filter:blur(15px);
      border-radius:24px;padding:16px;border:1px solid rgba(255,255,255,0.08);
      display:flex;flex-direction:column;gap:12px;
    }
    textarea{
      width:100%;background:transparent;border:none;color:#ddd;font-size:1rem;
      line-height:1.5;resize:none;outline:none;font-family:inherit;min-height:60px;
    }
    textarea::placeholder{color:#555;font-style:italic}
    .button-row{display:flex;gap:12px;align-items:center}
    .btn{
      background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);
      color:#ccc;padding:12px 20px;border-radius:40px;font-size:0.95rem;font-weight:500;
      cursor:pointer;backdrop-filter:blur(10px);transition:all 0.2s;
      display:flex;align-items:center;justify-content:center;gap:6px;flex:1;white-space:nowrap;
    }
    .btn.primary{
      background:rgba(200,160,255,0.2);border-color:rgba(200,160,255,0.4);
      color:#e8d5ff;font-weight:600;letter-spacing:1px;
    }
    .btn:active{transform:scale(0.96);background:rgba(255,255,255,0.12)}
    .btn.primary:active{background:rgba(200,160,255,0.35)}
    .btn:disabled{opacity:0.4;pointer-events:none}

    .top-right-area{position:fixed;top:20px;right:20px;z-index:20;display:flex;gap:10px;align-items:center}
    .star-dashboard{
      background:rgba(15,15,25,0.8);backdrop-filter:blur(10px);border-radius:30px;
      padding:8px 16px;display:flex;align-items:center;gap:10px;
      border:1px solid rgba(255,215,0,0.3);box-shadow:0 0 25px rgba(255,200,0,0.15);
      cursor:pointer;transition:all 0.3s;
    }
    .star-emoji{font-size:1.4rem;animation:starGlow 2s infinite alternate}
    @keyframes starGlow{0%{text-shadow:0 0 5px #ffd700}100%{text-shadow:0 0 20px #ffaa00}}
    .star-count{font-weight:600;font-size:1.1rem;color:#ffd966}
    .sound-toggle{
      background:rgba(15,15,25,0.8);backdrop-filter:blur(10px);border-radius:50%;
      width:38px;height:38px;display:flex;align-items:center;justify-content:center;
      cursor:pointer;border:1px solid rgba(255,255,255,0.15);color:#aaa;font-size:1.2rem;
    }
    .sound-toggle:active{background:rgba(60,60,80,0.7)}

    .galaxy-modal{
      position:fixed;top:0;left:0;width:100%;height:100%;
      background:rgba(0,0,0,0.85);backdrop-filter:blur(10px);z-index:100;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      opacity:0;pointer-events:none;transition:opacity 0.3s;
    }
    .galaxy-modal.open{opacity:1;pointer-events:auto}
    .galaxy-header{width:90%;max-width:400px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .batch-delete-btn{
      background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.2);
      color:#ccc;padding:8px 16px;border-radius:25px;font-size:0.85rem;
      cursor:pointer;backdrop-filter:blur(10px);transition:all 0.2s;
    }
    .batch-delete-btn.active{background:rgba(255,80,80,0.3);border-color:#ff5555}
    .batch-actions{display:none;gap:10px}
    .batch-actions.visible{display:flex}
    .galaxy-content{width:90%;max-width:400px;max-height:60vh;overflow-y:auto;display:flex;flex-wrap:wrap;gap:16px;justify-content:center;padding:20px}
    .galaxy-star{width:56px;height:56px;display:flex;align-items:center;justify-content:center;background:rgba(30,30,50,0.7);border-radius:14px;cursor:pointer;transition:transform 0.2s}
    .galaxy-star.selected{box-shadow:0 0 0 3px #ffd966}
    .close-btn{margin-top:20px;color:#aaa;background:transparent;border:1px solid #aaa;padding:8px 24px;border-radius:25px;cursor:pointer}
    .empty-hint{color:#666;text-align:center;padding:40px;width:100%}
    .toast{
      position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
      background:rgba(0,0,0,0.85);color:#ddd;padding:10px 22px;border-radius:30px;
      font-size:0.9rem;z-index:200;opacity:0;transition:opacity 0.3s;pointer-events:none;
    }
    .toast.show{opacity:1}
    .feedback-trigger{
      position:fixed;top:20px;left:20px;z-index:50;width:38px;height:38px;
      border-radius:50%;background:rgba(30,30,50,0.6);backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;
      justify-content:center;cursor:pointer;font-size:1rem;color:#999;transition:all 0.3s;
    }
    .feedback-trigger:active{background:rgba(60,60,80,0.7);transform:scale(0.94);color:#ccc}
    .feedback-modal{
      position:fixed;top:70px;left:20px;z-index:60;
      background:rgba(22,22,38,0.96);backdrop-filter:blur(20px);
      border-radius:18px;padding:22px 20px 18px;border:1px solid rgba(255,255,255,0.08);
      box-shadow:0 12px 40px rgba(0,0,0,0.5);width:250px;
      opacity:0;pointer-events:none;transform:translateY(-8px);transition:all 0.25s ease;
    }
    .feedback-modal.open{opacity:1;pointer-events:auto;transform:translateY(0)}
    .feedback-modal .qr-code{width:100%;max-width:200px;height:auto;margin:0 auto 14px;display:block;background:#fff;border-radius:10px;padding:6px;cursor:pointer}
    .feedback-modal .hint{font-size:0.78rem;color:#aaa;text-align:center;line-height:1.7}
    .feedback-modal .hint .warm{color:#e8d5b0}
    .feedback-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:55;pointer-events:none}
    .feedback-overlay.active{pointer-events:auto}
    .hint-text{font-size:0.7rem;color:#555;text-align:center;margin-top:-8px}
    .img-lightbox{
      position:fixed;top:0;left:0;width:100%;height:100%;
      background:rgba(0,0,0,0.88);backdrop-filter:blur(8px);z-index:300;
      display:flex;align-items:center;justify-content:center;
      opacity:0;pointer-events:none;transition:opacity 0.25s;
    }
    .img-lightbox.open{opacity:1;pointer-events:auto}
    .img-lightbox img{max-width:85%;max-height:80%;border-radius:12px;box-shadow:0 0 40px rgba(0,0,0,0.8);background:#fff;padding:8px}
  </style>
</head>
<body>
  <div class="bg-particles" id="particles"></div>
  <div class="bg-stars-container" id="bgStarsContainer"></div>

  <div class="container" id="mainApp" style="display:none;">
    <div class="title">
      <span class="title-main">碰碰星</span>
      <span class="title-sub">你的随身情绪充电站</span>
    </div>
    <div class="black-hole-wrapper" id="blackHoleWrapper">
      <div class="accretion-disk"></div>
      <div class="accretion-disk"></div>
      <div class="black-hole" id="blackHole"></div>
    </div>
    <div class="input-area">
      <textarea id="textInput" placeholder="把烦恼丢进去，吐出一颗星星…" maxlength="500"></textarea>
      <div class="button-row">
        <button class="btn primary" id="throwBtn">丢进黑洞</button>
        <button class="btn" id="voiceHintBtn" title="点击提示语音输入方法">🎤</button>
      </div>
    </div>
    <div class="hint-text">每吐槽一次，夜空里就多一颗星</div>
  </div>

  <div class="top-right-area" id="topRightArea" style="display:none;">
    <div class="sound-toggle" id="soundToggle" title="声音已关闭">🔇</div>
    <div class="star-dashboard" id="starDashboard">
      <span class="star-emoji">⭐</span>
      <span class="star-count" id="starCount">0</span>
    </div>
  </div>

  <div class="galaxy-modal" id="galaxyModal">
    <div class="galaxy-header">
      <button class="batch-delete-btn" id="batchDeleteBtn">⚡ 批量删除 (星星内容都可见)</button>
      <div class="batch-actions" id="batchActions">
        <button class="batch-delete-btn active" id="confirmBatchBtn">确认删除</button>
        <button class="batch-delete-btn" id="cancelBatchBtn">取消</button>
      </div>
    </div>
    <div class="galaxy-content" id="galaxyContent"></div>
    <button class="close-btn" id="closeGalaxy">关闭</button>
  </div>

  <div class="feedback-trigger" id="feedbackTrigger" title="有小困在听" style="display:none;">✉</div>
  <div class="feedback-overlay" id="feedbackOverlay"></div>
  <div class="feedback-modal" id="feedbackModal">
    <img class="qr-code" id="qrImage" src="Min.png" alt="关注小Min">
    <div class="hint">
      <span class="warm">点击放大 | 长按识别二维码</span><br>
      关注小红书，看Min日常<br>
    </div>
    <div class="social-row">
      <span>希望你天天开心！>‿❛</span>
    </div>
  </div>

  <div class="img-lightbox" id="imgLightbox">
    <img id="lightboxImg" src="" alt="二维码大图">
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ========== 纯前端激活验证 ==========
    const VALID_CODES = [
      'PPX-0001', 'PPX-0002', 'PPX-0003', 'PPX-0004', 'PPX-0005',
      'PPX-0006', 'PPX-0007', 'PPX-0008', 'PPX-0009', 'PPX-0010'
    ];

    function isActivated() {
      return localStorage.getItem('pengpeng_activated') === 'true';
    }

    function verifyCode(code) {
      return VALID_CODES.includes(code);
    }

    function activateAndEnter() {
      localStorage.setItem('pengpeng_activated', 'true');
      window.history.replaceState({}, document.title, window.location.pathname);
      document.getElementById('mainApp').style.display = 'flex';
      document.getElementById('topRightArea').style.display = 'flex';
      document.getElementById('feedbackTrigger').style.display = 'flex';
    }

    // 页面初始化
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');

    if (isActivated()) {
      activateAndEnter();
    } else if (code && verifyCode(code)) {
      activateAndEnter();
    } else {
      document.body.innerHTML = `
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#0a0a1a;color:#fff;font-family:sans-serif;text-align:center;padding:20px;">
          <div style="font-size:3rem;margin-bottom:20px;">⭐</div>
          <h2 style="color:#ffd966;">碰碰星</h2>
          <p style="color:#aaa;">请使用正版挂件碰一碰进入</p>
          <p style="color:#666;font-size:0.8rem;margin-top:30px;">>‿❛ 小Min在等你</p>
        </div>
      `;
      throw new Error('未授权');
    }

    // 以下是你的全部原有功能代码（已确保所有元素存在）
    (function() {
      // 声音开关
      let soundEnabled = false;
      const soundToggle = document.getElementById('soundToggle');
      soundToggle.addEventListener('click', () => {
        soundEnabled = !soundEnabled;
        soundToggle.textContent = soundEnabled ? '🔊' : '🔇';
        soundToggle.title = soundEnabled ? '声音已开启' : '声音已关闭';
      });

      function playStarChime() {
        if (!soundEnabled) return;
        try {
          const AudioCtxClass = window.AudioContext || window.webkitAudioContext;
          if (!AudioCtxClass) return;
          const audioCtx = new AudioCtxClass();
          const startSound = () => {
            const now = audioCtx.currentTime;
            const oscLow = audioCtx.createOscillator();
            const gainLow = audioCtx.createGain();
            oscLow.type = 'sine';
            oscLow.frequency.setValueAtTime(200, now);
            oscLow.frequency.linearRampToValueAtTime(300, now + 0.4);
            gainLow.gain.setValueAtTime(0.2, now);
            gainLow.gain.linearRampToValueAtTime(0, now + 0.5);
            oscLow.connect(gainLow); gainLow.connect(audioCtx.destination);
            oscLow.start(now); oscLow.stop(now + 0.5);
            const notes = [1200, 1600, 2000, 2400, 1800, 1400];
            notes.forEach((freq, i) => {
              const osc = audioCtx.createOscillator();
              const gain = audioCtx.createGain();
              osc.type = 'sine'; osc.frequency.value = freq;
              const startTime = now + 0.35 + i * 0.04;
              gain.gain.setValueAtTime(0.12, startTime);
              gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.25);
              osc.connect(gain); gain.connect(audioCtx.destination);
              osc.start(startTime); osc.stop(startTime + 0.3);
            });
            const bufferSize = audioCtx.sampleRate * 0.6;
            const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.25;
            const noise = audioCtx.createBufferSource();
            noise.buffer = noiseBuffer;
            const noiseGain = audioCtx.createGain();
            noiseGain.gain.setValueAtTime(0.15, now + 0.4);
            noiseGain.gain.linearRampToValueAtTime(0, now + 1.0);
            noise.connect(noiseGain); noiseGain.connect(audioCtx.destination);
            noise.start(now + 0.4); noise.stop(now + 1.0);
          };
          if (audioCtx.state === 'suspended') audioCtx.resume().then(startSound);
          else startSound();
        } catch (e) {}
      }

      // 背景粒子
      const particlesContainer = document.getElementById('particles');
      for (let i = 0; i < 60; i++) {
        const p = document.createElement('div'); p.className = 'particle';
        const size = Math.random() * 2.5 + 1;
        p.style.width = size + 'px'; p.style.height = size + 'px';
        p.style.left = Math.random() * 100 + '%'; p.style.top = Math.random() * 100 + '%';
        p.style.animationDelay = Math.random() * 8 + 's';
        p.style.animationDuration = (Math.random() * 8 + 6) + 's';
        particlesContainer.appendChild(p);
      }

      // 数据存储
      let stars = [];
      const STORAGE_KEY = 'pengpeng_stars';

      function loadStars() {
        try { const s = localStorage.getItem(STORAGE_KEY); if (s) stars = JSON.parse(s); else stars = []; } catch(e) { stars = []; }
      }
      function saveStars() {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(stars)); } catch(e) {
          if (stars.length > 0) { stars.shift(); saveStars(); }
        }
      }
      function addStar(star) { stars.push(star); saveStars(); updateCounter(); }
      function updateCounter() { document.getElementById('starCount').textContent = stars.length; }

      function makeStarSVG(text, ts) {
        let hash = 0;
        for (let i = 0; i < text.length; i++) hash = ((hash << 5) - hash + text.charCodeAt(i)) | 0;
        hash = Math.abs(hash);
        const h = (hash % 360 + (ts % 60) * 6) % 360, s = 65 + (hash % 25), l = 55 + (hash % 20);
        const c = `hsl(${h}, ${s}%, ${l}%)`, cg = `hsl(${h}, ${s}%, ${l + 15}%)`;
        const shape = hash % 5, rot = (hash % 30) - 15;
        let inner = '';
        if (shape === 0) inner = `<polygon points="24,2 29,20 48,24 29,28 24,46 19,28 0,24 19,20" fill="${c}" stroke="${cg}" stroke-width="0.8" transform="rotate(${rot} 24 24)"/>`;
        else if (shape === 1) { let pts = ''; for(let i=0;i<5;i++){const a=(i*72-90)*Math.PI/180,b=((i*72)+36-90)*Math.PI/180; pts+=`${(24+22*Math.cos(a)).toFixed(1)},${(24+22*Math.sin(a)).toFixed(1)} ${(24+9*Math.cos(b)).toFixed(1)},${(24+9*Math.sin(b)).toFixed(1)} `;} inner=`<polygon points="${pts.trim()}" fill="${c}" stroke="${cg}" stroke-width="0.8" transform="rotate(${rot} 24 24)"/>`; }
        else if (shape === 2) inner = `<polygon points="24,2 29,14 42,14 31,22 36,36 24,28 12,36 17,22 6,14 19,14" fill="${c}" stroke="${cg}" stroke-width="0.8" transform="rotate(${rot} 24 24)"/>`;
        else if (shape === 3) inner = `<path d="M24,40 C12,28 2,20 2,14 C2,7 8,2 14,2 C18,2 21,5 24,9 C27,5 30,2 34,2 C40,2 46,7 46,14 C46,20 36,28 24,40Z" fill="${c}" stroke="${cg}" stroke-width="0.8" transform="rotate(${rot} 24 24) scale(0.9) translate(3,3)"/>`;
        else { let petals = ''; for(let i=0;i<6;i++){const a=i*60*Math.PI/180; petals+=`<circle cx="${(24+10*Math.cos(a)).toFixed(1)}" cy="${(24+10*Math.sin(a)).toFixed(1)}" r="8" fill="${c}" stroke="${cg}" stroke-width="0.5"/>`;} inner=`<circle cx="24" cy="24" r="5" fill="${cg}"/>${petals}`; }
        return `<svg width="48" height="48" viewBox="0 0 48 48"><defs><filter id="g${ts}"><feGaussianBlur stdDeviation="1.5"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>${inner}</svg>`;
      }

      function createBgStar() {
        const cont = document.getElementById('bgStarsContainer');
        const d = document.createElement('div'); d.className = 'bg-star';
        const size = 14 + Math.random() * 22, hue = Math.floor(Math.random()*360);
        const c=`hsl(${hue},80%,75%)`, cg=`hsl(${hue},90%,85%)`;
        const h=size/2, ol=size*0.45, il=size*0.15;
        let pts='';
        for(let i=0;i<4;i++){const ao=(i*90)*Math.PI/180, ai=((i*90)+45)*Math.PI/180; pts+=`${(h+ol*Math.cos(ao)).toFixed(1)},${(h+ol*Math.sin(ao)).toFixed(1)} ${(h+il*Math.cos(ai)).toFixed(1)},${(h+il*Math.sin(ai)).toFixed(1)} `;}
        const uid = 'bg'+Date.now()+Math.random();
        d.innerHTML = `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><defs><filter id="g${uid}"><feGaussianBlur stdDeviation="1.2"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><polygon points="${pts.trim()}" fill="${c}" stroke="${cg}" stroke-width="0.5" filter="url(#g${uid})"/></svg>`;
        d.style.left = Math.random()*(innerWidth-40)+'px'; d.style.top = Math.random()*(innerHeight-40)+'px';
        d.style.width = d.style.height = size+'px';
        cont.appendChild(d);
      }

      function triggerScatterEffectJS(cx, cy) {
        const starCount = 28;
        const colors = [45,180,280,340,60,200,320,15,150,260,100,30,220,350,170,290,80,130,310,50];
        for(let i=0;i<starCount;i++){
          const star = document.createElement('div');
          star.style.cssText = `position:fixed;z-index:28;pointer-events:none;width:16px;height:16px;left:${cx}px;top:${cy}px;will-change:transform,opacity;`;
          const hue = colors[i%colors.length] + Math.floor(Math.random()*30);
          const shapeType = i%5;
          const color = `hsl(${hue},85%,72%)`, glow = `hsl(${hue},95%,82%)`;
          let shapeSVG = '';
          if(shapeType===0) shapeSVG = `<polygon points="8,0 9.5,6.5 16,8 9.5,9.5 8,16 6.5,9.5 0,8 6.5,6.5" fill="${color}" stroke="${glow}" stroke-width="0.3"/>`;
          else if(shapeType===1){ const or=7,ir=3; let pts=''; for(let j=0;j<5;j++){const ao=(j*72-90)*Math.PI/180, ai=((j*72)+36-90)*Math.PI/180; pts+=`${(8+or*Math.cos(ao)).toFixed(1)},${(8+or*Math.sin(ao)).toFixed(1)} ${(8+ir*Math.cos(ai)).toFixed(1)},${(8+ir*Math.sin(ai)).toFixed(1)} `;} shapeSVG = `<polygon points="${pts}" fill="${color}" stroke="${glow}" stroke-width="0.3"/>`; }
          else if(shapeType===2) shapeSVG = `<circle cx="8" cy="8" r="6.5" fill="${color}" stroke="${glow}" stroke-width="0.3"/>`;
          else if(shapeType===3) shapeSVG = `<path d="M8,14 C4,10 1,7 1,5 C1,3 3,1 5,1 C6.5,1 7.5,2 8,3.5 C8.5,2 9.5,1 11,1 C13,1 15,3 15,5 C15,7 12,10 8,14Z" fill="${color}" stroke="${glow}" stroke-width="0.3" transform="scale(0.85) translate(1.2,1.2)"/>`;
          else shapeSVG = `<rect x="1.5" y="1.5" width="13" height="13" rx="2" fill="${color}" stroke="${glow}" stroke-width="0.3" transform="rotate(45 8 8)"/>`;
          star.innerHTML = `<svg width="16" height="16" viewBox="0 0 16 16">${shapeSVG}</svg>`;
          document.body.appendChild(star);
          const angle = (i/starCount)*Math.PI*2 + (Math.random()-0.5)*0.8;
          const speed = 60 + Math.random()*140;
          const dx = Math.cos(angle)*speed, dy = Math.sin(angle)*speed - 30;
          const duration = 1200 + Math.random()*400;
          const startTime = performance.now();
          function animate(now){
            const elapsed = now - startTime;
            const progress = Math.min(elapsed/duration,1);
            const ease = 1 - Math.pow(1-progress,3);
            const x = dx*ease, y = dy*ease;
            const scale = 1 - progress*0.6;
            const opacity = 1 - progress;
            star.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
            star.style.opacity = opacity;
            if(progress<1) requestAnimationFrame(animate);
            else star.remove();
          }
          requestAnimationFrame(animate);
        }
        const big = document.createElement('div');
        big.style.cssText = `position:fixed;z-index:29;pointer-events:none;left:${cx}px;top:${cy}px;width:64px;height:64px;transform:translate(-50%,-50%) scale(0);transition:transform 0.5s cubic-bezier(0.25,0.1,0.25,1.2);`;
        if(stars.length>0) big.innerHTML = stars[stars.length-1].svg;
        else big.innerHTML = `<svg width="64" height="64" viewBox="0 0 48 48"><polygon points="24,2 29,20 48,24 29,28 24,46 19,28 0,24 19,20" fill="#ffd966" stroke="#fff" stroke-width="1"/></svg>`;
        document.body.appendChild(big);
        requestAnimationFrame(()=>{ big.style.transform = 'translate(-50%,-50%) scale(1)'; });
        setTimeout(()=>{
          const dash = document.getElementById('starDashboard');
          if(dash){
            const r = dash.getBoundingClientRect();
            big.style.transition = 'all 0.7s cubic-bezier(0.25,0.1,0.15,1.2)';
            big.style.left = (r.left + r.width/2) + 'px';
            big.style.top = (r.top + r.height/2) + 'px';
            big.style.transform = 'translate(-50%,-50%) scale(0.5)';
            big.style.opacity = '0.6';
          }
          setTimeout(()=> big.remove(), 700);
        }, 500);
      }

      const throwBtn = document.getElementById('throwBtn');
      const textInput = document.getElementById('textInput');
      const blackHole = document.getElementById('blackHole');
      const holeWrapper = document.getElementById('blackHoleWrapper');

      function triggerBlackHole() {
        const text = textInput.value.trim();
        if (!text) { showToast('写点什么再丢进去吧'); vibrate(30); return; }
        textInput.blur();
        window.scrollTo(0,0);
        document.body.style.height = '100vh';
        throwBtn.disabled = true;
        setTimeout(() => {
          document.body.style.height = '';
          playStarChime();
          vibrate([30,50,30]);
          const textRect = textInput.getBoundingClientRect();
          const holeRect = holeWrapper.getBoundingClientRect();
          const cx = holeRect.left + holeRect.width/2;
          const cy = holeRect.top + holeRect.height/2;
          const chars = text.split('');
          chars.forEach((char, idx) => {
            const span = document.createElement('span');
            span.textContent = char;
            span.style.cssText = `position:fixed;z-index:25;pointer-events:none;color:#ddd;font-size:1.2rem;font-weight:bold;transition:all 0.7s cubic-bezier(0.25,0.1,0.25,1);opacity:1;left:${textRect.left+Math.random()*textRect.width}px;top:${textRect.top+Math.random()*textRect.height}px;`;
            document.body.appendChild(span);
            requestAnimationFrame(() => {
              span.style.transform = `translate(${cx-parseFloat(span.style.left)}px, ${cy-parseFloat(span.style.top)}px) scale(0.2) rotate(${Math.random()*720}deg)`;
              span.style.opacity = '0';
            });
            setTimeout(() => span.remove(), 700+idx*10);
          });
          textInput.value = '';
          setTimeout(() => {
            blackHole.style.transform = 'translate(-50%, -50%) scale(1.2)';
            blackHole.style.boxShadow = '0 0 60px rgba(150,50,220,0.8), 0 0 100px rgba(0,0,0,0.9)';
            vibrate(50);
          }, 400);
          setTimeout(() => {
            try {
              blackHole.style.transform = 'translate(-50%, -50%) scale(1)';
              blackHole.style.boxShadow = '0 0 40px rgba(100,50,200,0.4), 0 0 80px rgba(0,0,0,0.9)';
              const timestamp = Date.now();
              const svgString = makeStarSVG(text, timestamp);
              addStar({ svg: svgString, text: text.slice(0,200), time: timestamp });
              triggerScatterEffectJS(cx, cy);
              createBgStar();
            } catch(e) {} finally {
              throwBtn.disabled = false;
            }
          }, 800);
        }, 300);
      }

      throwBtn.addEventListener('click', triggerBlackHole);
      textInput.addEventListener('keydown', e => {
        if (e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); triggerBlackHole(); }
      });

      // 语音提示按钮
      const voiceHintBtn = document.getElementById('voiceHintBtn');
      voiceHintBtn.addEventListener('click', () => {
        showToast('点击输入框后，按键盘上的🎤按钮语音输入');
      });

      // 批量删除相关
      let batchMode = false, selectedIndices = new Set();
      const batchDeleteBtn = document.getElementById('batchDeleteBtn');
      const batchActions = document.getElementById('batchActions');
      const confirmBatchBtn = document.getElementById('confirmBatchBtn');
      const cancelBatchBtn = document.getElementById('cancelBatchBtn');

      function renderGalaxy() {
        const content = document.getElementById('galaxyContent');
        content.innerHTML = '';
        if (stars.length === 0) { content.innerHTML = '<div class="empty-hint">还没有星星<br>去丢一些烦恼吧</div>'; return; }
        stars.forEach((star, idx) => {
          const div = document.createElement('div');
          div.className = 'galaxy-star' + (batchMode && selectedIndices.has(idx) ? ' selected' : '');
          div.innerHTML = star.svg;
          div.addEventListener('click', () => {
            if (batchMode) {
              if (selectedIndices.has(idx)) { selectedIndices.delete(idx); div.classList.remove('selected'); }
              else { selectedIndices.add(idx); div.classList.add('selected'); }
            } else {
              showToast(star.text.slice(0, 50) + '...');
            }
          });
          content.appendChild(div);
        });
      }

      function enterBatchMode() { batchMode = true; selectedIndices.clear(); batchDeleteBtn.style.display = 'none'; batchActions.classList.add('visible'); renderGalaxy(); }
      function exitBatchMode() { batchMode = false; selectedIndices.clear(); batchDeleteBtn.style.display = 'inline-block'; batchActions.classList.remove('visible'); renderGalaxy(); }
      batchDeleteBtn.addEventListener('click', enterBatchMode);
      cancelBatchBtn.addEventListener('click', exitBatchMode);
      confirmBatchBtn.addEventListener('click', () => {
        if (selectedIndices.size === 0) { showToast('还没有选择星星'); return; }
        const indices = Array.from(selectedIndices).sort((a,b)=>b-a);
        indices.forEach(i => stars.splice(i,1));
        saveStars(); updateCounter();
        showToast(`已删除 ${indices.length} 颗星星`);
        exitBatchMode(); renderGalaxy();
      });

      function showGalaxy() { if(batchMode) exitBatchMode(); renderGalaxy(); document.getElementById('galaxyModal').classList.add('open'); }
      function hideGalaxy() { document.getElementById('galaxyModal').classList.remove('open'); if(batchMode) exitBatchMode(); }
      document.getElementById('starDashboard').addEventListener('click', showGalaxy);
      document.getElementById('closeGalaxy').addEventListener('click', hideGalaxy);
      document.getElementById('galaxyModal').addEventListener('click', e => { if(e.target === document.getElementById('galaxyModal')) hideGalaxy(); });

      // 反馈弹窗
      const fbTrig = document.getElementById('feedbackTrigger'), fbMod = document.getElementById('feedbackModal'), fbOver = document.getElementById('feedbackOverlay');
      fbTrig.addEventListener('click', () => {
        if(fbMod.classList.contains('open')){ fbMod.classList.remove('open'); fbOver.classList.remove('active'); }
        else { fbMod.classList.add('open'); fbOver.classList.add('active'); }
      });
      fbOver.addEventListener('click', () => { fbMod.classList.remove('open'); fbOver.classList.remove('active'); });

      // 图片灯箱
      const qrImg = document.getElementById('qrImage'), lightbox = document.getElementById('imgLightbox'), lightboxImg = document.getElementById('lightboxImg');
      qrImg.addEventListener('click', () => { lightboxImg.src = qrImg.src; lightbox.classList.add('open'); });
      lightbox.addEventListener('click', () => lightbox.classList.remove('open'));

      function vibrate(p) { if (navigator.vibrate) navigator.vibrate(p); }
      function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }

      loadStars();
      updateCounter();
    })();
  </script>
</body>
</html>
